networks:
  default:
    name: web-richymaju_default

services:
  caddy:
    image: caddy:2-alpine
    container_name: container-caddy
    restart: unless-stopped
    depends_on:
      - laravel
      - reverb
      - waha
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  laravel:
    build:
      context: .
    container_name: container-laravel
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      default:
        aliases:
          - laravel
    expose:
      - "80"
    environment:
      APP_NAME: "Richy Maju"
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "false"
      APP_URL: "https://richymaju.my.id"
      SESSION_SECURE_COOKIE: "true"
      SESSION_SAME_SITE: "lax"
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: reverb
      REVERB_PORT: "8080"
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: reverb
      REVERB_SERVER_PORT: "8080"
      REVERB_SERVER_SCHEME: http
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      MAIL_MAILER: smtp
      MAIL_SCHEME: smtps
      MAIL_HOST: smtp.sumopod.com
      MAIL_PORT: "465"
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO}
      WAHA_BASE_URL: "http://waha:3000"
      WAHA_PUBLIC_URL: "https://wa.richymaju.my.id"
      WAHA_API_KEY: ${WAHA_API_KEY}
    volumes:
      - /home/ubuntu/web-richymaju:/var/www/html

  reverb:
    build:
      context: .
    container_name: container-reverb
    restart: unless-stopped
    entrypoint: ["php"]
    command: ["artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    depends_on:
      - laravel
    expose:
      - "8080"
    environment:
      APP_KEY: "${APP_KEY}"
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST:-richymaju.my.id}
      REVERB_PORT: ${REVERB_PORT:-443}
      REVERB_SCHEME: ${REVERB_SCHEME:-https}
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    volumes:
      - /home/ubuntu/web-richymaju:/var/www/html

  mysql:
    image: mysql:latest
    container_name: container-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  waha:
    image: devlikeapro/waha:latest
    container_name: container-whatsapp
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      WAHA_API_KEY: ${WAHA_API_KEY}
      WAHA_DASHBOARD_ENABLED: "true"
      WAHA_DASHBOARD_USERNAME: ${WAHA_DASHBOARD_USERNAME}
      WAHA_DASHBOARD_PASSWORD: ${WAHA_DASHBOARD_PASSWORD}
      WAHA_DASHBOARD_NO_PASSWORD: ${WAHA_DASHBOARD_NO_PASSWORD:-false}
      WHATSAPP_SWAGGER_USERNAME: ${WHATSAPP_SWAGGER_USERNAME}
      WHATSAPP_SWAGGER_PASSWORD: ${WHATSAPP_SWAGGER_PASSWORD}
      WHATSAPP_SWAGGER_NO_PASSWORD: ${WHATSAPP_SWAGGER_NO_PASSWORD:-false}
      WAHA_PRINT_QR: "false"
      WAHA_LOG_FORMAT: JSON
      WAHA_LOG_LEVEL: info
      WAHA_BASE_URL: "https://wa.richymaju.my.id"
    volumes:
      - waha-sessions:/app/.sessions
      - waha-files:/app/.media

volumes:
  mysql-data:
  waha-sessions:
  waha-files:
  caddy-data:
  caddy-config:
